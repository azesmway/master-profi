<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Нет соединения — Мастер</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0F0F0F;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .wrap {
      text-align: center;
      max-width: 320px;
    }
    .icon { font-size: 64px; margin-bottom: 24px; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
    p { color: #999; font-size: 15px; line-height: 1.5; margin-bottom: 32px; }
    button {
      background: #FF6B35;
      color: #fff;
      border: none;
      border-radius: 16px;
      padding: 16px 32px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="icon">📡</div>
    <h1>Нет соединения</h1>
    <p>Проверьте подключение к интернету и попробуйте снова</p>
    <button onclick="window.location.reload()">Повторить попытку</button>
  </div>
</body>
</html>
