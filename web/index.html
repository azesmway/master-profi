<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- ── Viewport — viewport-fit=cover критично для iPhone notch/island ── -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0">

  <title>Мастер — найти специалиста</title>

  <!-- ── PWA Manifest ───────────────────────────────────────────────────── -->
  <link rel="manifest" href="/manifest.json">

  <!-- ── Theme color ────────────────────────────────────────────────────── -->
  <meta name="theme-color" content="#0F0F0F">

  <!-- ── iOS Safari PWA ────────────────────────────────────────────────── -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Мастер">

  <!-- iOS иконки -->
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192.png">

  <!-- iOS Splash screens -->
  <link rel="apple-touch-startup-image" href="/splash/splash-1290x2796.png"
    media="screen and (device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)">
  <link rel="apple-touch-startup-image" href="/splash/splash-1170x2532.png"
    media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)">
  <link rel="apple-touch-startup-image" href="/splash/splash-750x1334.png"
    media="screen and (device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)">

  <!-- ── Android Chrome ────────────────────────────────────────────────── -->
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="32x32"   href="/icons/icon-96.png">
  <link rel="shortcut icon"         href="/icons/icon-96.png">

  <!-- ── Отключаем автодетект телефонов, подсветку тапа ────────────────── -->
  <meta name="format-detection" content="telephone=no">
  <meta name="msapplication-tap-highlight" content="no">

  <!-- ── Open Graph ─────────────────────────────────────────────────────── -->
  <meta property="og:title"       content="Мастер — найти специалиста">
  <meta property="og:description" content="Ремонт, красота, репетиторы. AI-подбор, эскроу-оплата, бесплатные отклики.">
  <meta property="og:image"       content="/og-image.png">
  <meta property="og:type"        content="website">
  <meta name="twitter:card"       content="summary_large_image">

  <style>
    /* ── Сброс для fullscreen PWA ──────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      /* Запрещаем overscroll-bounce в Safari */
      overscroll-behavior: none;
      overflow: hidden;
      background: #0F0F0F;
      /* Шрифт как в iOS */
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    #root {
      width: 100%;
      height: 100%;
      /* safe-area-inset — отступы под Dynamic Island / notch / home indicator */
      padding-top:    env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left:   env(safe-area-inset-left);
      padding-right:  env(safe-area-inset-right);
      overflow: hidden;
    }

    /* Splash экран пока грузится JS */
    #splash {
      position: fixed;
      inset: 0;
      background: #0F0F0F;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }
    #splash.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #splash-icon {
      width: 80px;
      height: 80px;
      background: #FF6B35;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }
    #splash-title {
      color: #fff;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    #splash-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #2E2E2E;
      border-top-color: #FF6B35;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-top: 8px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Скрываем scrollbar у body */
    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>

  <!-- Splash screen -->
  <div id="splash">
    <div id="splash-icon">🔧</div>
    <div id="splash-title">Мастер</div>
    <div id="splash-spinner"></div>
  </div>

  <!-- Expo React Native Web монтируется сюда -->
  <div id="root"></div>

  <script>
    // ── Скрываем splash когда приложение загрузилось ─────────────────────
    // Expo Router вызывает это через expo-splash-screen, но для web
    // добавим fallback через MutationObserver
    (function() {
      var splash = document.getElementById('splash');
      var observer = new MutationObserver(function() {
        var root = document.getElementById('root');
        if (root && root.childElementCount > 0) {
          setTimeout(function() {
            splash.classList.add('hidden');
            setTimeout(function() { splash.remove(); }, 500);
          }, 300);
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true, subtree: true });

      // Fallback — убираем через 5 секунд в любом случае
      setTimeout(function() {
        splash.classList.add('hidden');
        setTimeout(function() { if (splash.parentNode) splash.remove(); }, 500);
      }, 5000);
    })();

    // ── Регистрируем Service Worker ──────────────────────────────────────
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js', { scope: '/' })
          .then(function(reg) {
            console.log('[PWA] SW registered:', reg.scope);
          })
          .catch(function(err) {
            console.warn('[PWA] SW registration failed:', err);
          });
      });
    }

    // ── Блокируем pinch-zoom (как в нативном приложении) ─────────────────
    document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
    document.addEventListener('gesturechange', function(e) { e.preventDefault(); });

    // ── Блокируем контекстное меню на мобильных ──────────────────────────
    document.addEventListener('contextmenu', function(e) {
      if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
        e.preventDefault();
      }
    });
  </script>
</body>
</html>
